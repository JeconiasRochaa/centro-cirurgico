<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRPI - Painel Cirúrgico</title>
    <style>
        :root {
            --bg-primary: #06224a;
            --bg-secondary: #051a38;
            --bg-tertiary: #041630;
            --border-color: #0d3470;
            --gold: #c8a94a;
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --text-muted: #7a8fa8;
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --green: #10b981;
            --green-light: #34d399;
            --orange: #f59e0b;
            --orange-light: #fbbf24;
            --red: #ef4444;
            --red-light: #fca5a5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100vw;
        }

        .ecg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 1.5% 0;
        }

        .ecg-line-wrapper { width: 100%; height: 45px; }
        .ecg-line-wrapper svg { width: 100%; height: 100%; }

        .ecg-path {
            fill: none; stroke: var(--gold);
            stroke-width: 2; stroke-dasharray: 2000;
            animation: ecg 4s linear infinite;
        }
        .ecg-path:nth-child(2) { animation-delay: 1.3s; stroke-width: 1.5; opacity: 0.5; }
        .ecg-path:nth-child(3) { animation-delay: 2.6s; stroke-width: 1; opacity: 0.3; }

        @keyframes ecg {
            from { stroke-dashoffset: 2000; }
            to { stroke-dashoffset: 0; }
        }

        .container {
            position: relative; z-index: 1;
            min-height: 100vh; display: flex; flex-direction: column;
            width: 100vw; overflow: visible;
        }

        /* HEADER */
        .header {
            background: linear-gradient(180deg, rgba(5,26,56,0.99) 0%, rgba(4,22,48,0.99) 100%);
            border-bottom: 3px solid var(--gold);
            padding: 12px 30px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 20px; flex-shrink: 0; height: 80px;
        }

        .hospital-brand { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
        .logos-container { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        .logo-box {
            width: 62px; height: 62px; min-width: 62px;
            background: #ffffff; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 18px rgba(200, 169, 74, 0.25);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 9px; }

        .hospital-info { min-width: 0; }
        .hospital-info h1 {
            font-size: 26px; font-weight: 700;
            letter-spacing: 1.8px; color: var(--text-primary);
            text-transform: uppercase; line-height: 1.2;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .hospital-info .subtitle {
            font-size: 14px; color: var(--gold);
            letter-spacing: 3.5px; margin-top: 3px; font-weight: 500;
        }

        .time-box { text-align: right; flex-shrink: 0; }
        .time-display {
            font-size: 48px; font-weight: 700;
            color: var(--gold); letter-spacing: 2.5px;
            font-family: 'Courier New', monospace; line-height: 1;
            text-shadow: 0 0 18px rgba(200, 169, 74, 0.3);
        }
        .date-display {
            font-size: 15px; color: var(--text-secondary);
            letter-spacing: 1.2px; margin-top: 4px;
        }

        /* NOTIFICAÇÃO */
        .notification-bar {
            background: linear-gradient(90deg, #1a3a5f, #0f1f3a, #1a3a5f);
            border-bottom: 2px solid #fbbf24; padding: 10px 25px;
            display: none; align-items: center; justify-content: center;
            gap: 12px; flex-shrink: 0; animation: slideDown 0.5s ease; height: 44px;
        }
        .notification-bar.show { display: flex; }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .notification-icon { font-size: 24px; animation: bellRing 1s infinite; }
        @keyframes bellRing {
            0%,100%{transform:rotate(0)}
            10%{transform:rotate(15deg)}
            20%{transform:rotate(-15deg)}
            30%{transform:rotate(10deg)}
            40%{transform:rotate(-10deg)}
            50%{transform:rotate(0)}
        }
        .notification-text {
            font-size: 17px; color: #fbbf24;
            letter-spacing: 0.8px; font-weight: 700; text-align: center;
        }

        /* STATUS BAR */
        .status-bar {
            background: rgba(6, 34, 74, 0.98); border-bottom: 1px solid var(--border-color);
            padding: 10px 30px; display: flex; justify-content: center;
            gap: 70px; flex-shrink: 0; height: 60px; align-items: center;
        }
        .status-item { text-align: center; }
        .status-value {
            font-size: 38px; font-weight: 700;
            color: var(--gold); line-height: 1;
            text-shadow: 0 0 10px rgba(200, 169, 74, 0.3);
        }
        .status-label {
            font-size: 12px; color: var(--text-muted);
            letter-spacing: 2.5px; text-transform: uppercase;
            margin-top: 2px; font-weight: 500;
        }

        /* PANEL CONTENT */
        .panel-content { flex: 1; padding: 14px 30px; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
        .table-wrapper {
            flex: 1; border-radius: 8px; background: rgba(0,0,0,0.18);
            overflow-y: auto; overflow-x: hidden;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; table-layout: fixed; }
        thead { position: sticky; top: 0; z-index: 10; }

        thead th {
            background: var(--bg-tertiary); padding: 14px 6px;
            text-align: center; color: var(--gold);
            font-size: 12.5px; letter-spacing: 1.5px;
            text-transform: uppercase; border-bottom: 2px solid var(--gold);
            white-space: nowrap; font-weight: 700;
        }

        thead th:nth-child(1){width:5.5%} thead th:nth-child(2){width:7%}
        thead th:nth-child(3){width:13%} thead th:nth-child(4){width:5%}
        thead th:nth-child(5){width:18.5%} thead th:nth-child(6){width:13%}
        thead th:nth-child(7){width:8%} thead th:nth-child(8){width:10%}
        thead th:nth-child(9){width:7%} thead th:nth-child(10){width:10%}

        tbody tr { background: rgba(255,255,255,0.035); transition: all 0.3s; }
        tbody tr:hover { background: rgba(255,255,255,0.07); }
        tbody td {
            padding: 13px 6px; font-size: 14.5px;
            color: var(--text-primary); border-bottom: 1px solid rgba(255,255,255,0.04);
            font-weight: 500; vertical-align: middle; text-align: center;
            white-space: normal; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.3;
        }
        tbody td:nth-child(3), tbody td:nth-child(5), tbody td:nth-child(6) { text-align: left; padding-left: 10px; }

        .row-ongoing {
            background: rgba(59,130,246,0.18)!important;
            border-left: 3px solid var(--blue)!important;
            animation: rowAlert 2s infinite;
        }
        .row-cancelled { opacity: 0.5; border-left: 3px solid var(--red)!important; }
        .row-cancelled td { text-decoration: line-through; text-decoration-color: rgba(239,68,68,0.4); text-decoration-thickness: 1px; }

        @keyframes rowAlert {
            0%,100%{background:rgba(59,130,246,0.18)}
            50%{background:rgba(59,130,246,0.28)}
        }

        .status-badge {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 5px; padding: 6px 14px; border-radius: 22px;
            font-size: 11.5px; font-weight: 600;
            letter-spacing: 0.7px; white-space: nowrap;
        }
        .status-waiting { background: rgba(245,158,11,0.22); border: 1.5px solid var(--orange); color: var(--orange-light); }
        .status-progress { background: rgba(59,130,246,0.22); border: 1.5px solid var(--blue); color: var(--blue-light); animation: statusPulse 1.5s infinite; }
        .status-done { background: rgba(16,185,129,0.22); border: 1.5px solid var(--green); color: var(--green-light); }
        .status-cancelled { background: rgba(239,68,68,0.22); border: 1.5px solid var(--red); color: var(--red-light); }

        @keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

        .specialty-tag {
            font-size: 10px; color: var(--gold);
            background: rgba(200,169,74,0.18); padding: 2px 8px;
            border-radius: 10px; display: inline-block; margin-top: 2px; white-space: nowrap;
        }
        .cancel-badge {
            font-size: 9px; color: var(--red-light);
            background: rgba(239,68,68,0.18); padding: 1px 6px;
            border-radius: 7px; display: inline-block; margin-top: 2px; cursor: help;
        }
        .cell-content { display: block; line-height: 1.3; }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 22px; letter-spacing: 2px; }

        .footer {
            background: rgba(5,26,56,0.98); border-top: 1px solid var(--border-color);
            padding: 8px 30px; display: flex; justify-content: space-between;
            font-size: 11px; color: var(--text-muted);
            letter-spacing: 1px; flex-shrink: 0; height: 32px; align-items: center;
        }

        .table-wrapper::-webkit-scrollbar { width: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.25); border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* =========================
           TVS 4K E TELÕES
        ========================= */
        @media (min-width: 2560px) {
            .header { height: 120px; padding: 20px 50px; }
            .logo-box { width: 90px; height: 90px; min-width: 90px; }
            .hospital-info h1 { font-size: 42px; }
            .hospital-info .subtitle { font-size: 20px; }
            .time-display { font-size: 72px; }
            .date-display { font-size: 22px; }
            .status-value { font-size: 60px; }
            .status-label { font-size: 18px; }
            thead th { font-size: 18px; padding: 18px; }
            tbody td { font-size: 18px; padding: 18px; }
            .status-badge { font-size: 15px; padding: 10px 20px; }
        }

        /* =========================
           NOTEBOOKS
        ========================= */
        @media (max-width: 1400px) {
            .header { height: auto; padding: 12px 20px; }
            .hospital-info h1 { font-size: 22px; }
            .time-display { font-size: 38px; }
            .status-value { font-size: 28px; }
            .status-bar { gap: 35px; }
        }

        /* =========================
           TABLETS
        ========================= */
        @media (max-width: 1024px) {
            body { overflow-y: auto; }
            .header { flex-wrap: wrap; height: auto; padding: 15px; gap: 15px; }
            .hospital-brand { width: 100%; }
            .time-box { width: 100%; text-align: center; }
            .time-display { font-size: 32px; }
            .status-bar { flex-wrap: wrap; height: auto; gap: 20px; padding: 12px; }
            .status-item { min-width: 120px; }
            .panel-content { padding: 10px; }
            .table-wrapper { overflow-x: auto; }
            table { min-width: 1200px; }
        }

        /* =========================
           CELULARES
        ========================= */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: center; text-align: center; }
            .hospital-brand { flex-direction: column; align-items: center; }
            .logos-container { justify-content: center; }
            .hospital-info h1 { font-size: 18px; white-space: normal; }
            .hospital-info .subtitle { font-size: 12px; letter-spacing: 2px; }
            .time-display { font-size: 28px; }
            .date-display { font-size: 12px; }
            .notification-text { font-size: 13px; }
            .status-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; height: auto; }
            .status-item { padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
            .status-value { font-size: 26px; }
            .status-label { font-size: 10px; }
            .panel-content { padding: 5px; }
            .footer { flex-direction: column; gap: 4px; height: auto; padding: 10px; text-align: center; }
            table { min-width: 1300px; }
        }

        /* =========================
           CELULARES PEQUENOS
        ========================= */
        @media (max-width: 480px) {
            .logo-box { width: 45px; height: 45px; min-width: 45px; }
            .hospital-info h1 { font-size: 15px; }
            .time-display { font-size: 22px; }
            .status-value { font-size: 22px; }
            .notification-text { font-size: 11px; }
            .status-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="ecg-container">
        <div class="ecg-line-wrapper"><svg viewBox="0 0 2000 100" preserveAspectRatio="none"><path class="ecg-path" d="M0,50 L150,50 L180,50 L200,10 L220,90 L240,50 L260,10 L280,90 L300,50 L500,50"/><path class="ecg-path" d="M500,50 L650,50 L680,50 L700,10 L720,90 L740,50 L760,10 L780,90 L800,50 L1000,50"/><path class="ecg-path" d="M1000,50 L1150,50 L1180,50 L1200,10 L1220,90 L1240,50 L1260,10 L1280,90 L1300,50 L1500,50"/></svg></div>
        <div class="ecg-line-wrapper"><svg viewBox="0 0 2000 100" preserveAspectRatio="none"><path class="ecg-path" d="M0,50 L150,50 L180,50 L200,10 L220,90 L240,50 L260,10 L280,90 L300,50 L500,50"/><path class="ecg-path" d="M500,50 L650,50 L680,50 L700,10 L720,90 L740,50 L760,10 L780,90 L800,50 L1000,50"/></svg></div>
        <div class="ecg-line-wrapper"><svg viewBox="0 0 2000 100" preserveAspectRatio="none"><path class="ecg-path" d="M0,50 L150,50 L180,50 L200,10 L220,90 L240,50 L260,10 L280,90 L300,50 L500,50"/><path class="ecg-path" d="M500,50 L650,50 L680,50 L700,10 L720,90 L740,50 L760,10 L780,90 L800,50 L1000,50"/><path class="ecg-path" d="M1000,50 L1150,50 L1180,50 L1200,10 L1220,90 L1240,50 L1260,10 L1280,90 L1300,50 L1500,50"/></svg></div>
        <div class="ecg-line-wrapper"><svg viewBox="0 0 2000 100" preserveAspectRatio="none"><path class="ecg-path" d="M0,50 L150,50 L180,50 L200,10 L220,90 L240,50 L260,10 L280,90 L300,50 L500,50"/></svg></div>
        <div class="ecg-line-wrapper"><svg viewBox="0 0 2000 100" preserveAspectRatio="none"><path class="ecg-path" d="M0,50 L150,50 L180,50 L200,10 L220,90 L240,50 L260,10 L280,90 L300,50 L500,50"/><path class="ecg-path" d="M500,50 L650,50 L680,50 L700,10 L720,90 L740,50 L760,10 L780,90 L800,50 L1000,50"/><path class="ecg-path" d="M1000,50 L1150,50 L1180,50 L1200,10 L1220,90 L1240,50 L1260,10 L1280,90 L1300,50 L1500,50"/></svg></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="hospital-brand">
                <div class="logos-container">
                    <div class="logo-box" id="logoContainer"><span style="font-size:28px">🏥</span></div>
                    <div class="logo-box" id="govLogoContainer"><span style="font-size:28px">🏛️</span></div>
                </div>
                <div class="hospital-info">
                    <h1>Hospital Regional de Palmeira dos Índios</h1>
                    <div class="subtitle">HRPI • Centro Cirúrgico</div>
                </div>
            </div>
            <div class="time-box">
                <div class="time-display" id="liveTime">00:00:00</div>
                <div class="date-display" id="liveDate"></div>
            </div>
        </div>

        <div class="notification-bar" id="notificationBar">
            <span class="notification-icon">🔔</span>
            <span class="notification-text" id="notificationText"></span>
        </div>

        <div class="status-bar">
            <div class="status-item"><div class="status-value" id="inProgress">00</div><div class="status-label">Em Andamento</div></div>
            <div class="status-item"><div class="status-value" id="completed">00</div><div class="status-label">Finalizados</div></div>
            <div class="status-item"><div class="status-value" id="waiting">00</div><div class="status-label">Aguardando</div></div>
            <div class="status-item"><div class="status-value" id="cancelled">00</div><div class="status-label">Canceladas</div></div>
        </div>

        <div class="panel-content">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Sala</th><th>Horário</th><th>Paciente</th><th>Idade</th>
                            <th>Procedimento</th><th>Médico</th><th>Especialid.</th>
                            <th>Anestesista</th><th>Circ.</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="surgeriesTableBody">
                        <tr><td colspan="10"><div class="empty-state">CONECTANDO AO SERVIDOR...</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <span>© 2026 HRPI</span><span>Painel Cirúrgico v8.0</span>
            <span id="updateTime">Atualizado: --:--:--</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBiuJsJ-Wt2L6NB0WFlalLLFGcgLWJ49w8",
            authDomain: "centro-cirurgico-eaf76.firebaseapp.com",
            databaseURL: "https://centro-cirurgico-eaf76-default-rtdb.firebaseio.com",
            projectId: "centro-cirurgico-eaf76",
            storageBucket: "centro-cirurgico-eaf76.firebasestorage.app",
            messagingSenderId: "620414910337",
            appId: "1:620414910337:web:4592fa24f0d8f41d673280"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        function getToday(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
        let TODAY=getToday(),currentSurgeries=[],lastDayCheck=new Date().getDate(),notificationTimeout=null,lastNotifiedSurgeryId=null;

        function playNotificationSound(){
            try{
                const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();
                o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(800,a.currentTime);
                o.frequency.setValueAtTime(1000,a.currentTime+.1);g.gain.setValueAtTime(.3,a.currentTime);
                g.gain.exponentialRampToValueAtTime(.01,a.currentTime+.3);o.start(a.currentTime);o.stop(a.currentTime+.3);
                setTimeout(()=>{const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);
                o2.frequency.setValueAtTime(1000,a.currentTime);o2.frequency.setValueAtTime(1200,a.currentTime+.1);
                g2.gain.setValueAtTime(.3,a.currentTime);g2.gain.exponentialRampToValueAtTime(.01,a.currentTime+.3);
                o2.start(a.currentTime);o2.stop(a.currentTime+.3)},200)
            }catch(e){}
        }

        function checkNextSurgery(){
            const p=currentSurgeries.filter(s=>s.date===TODAY&&s.status==='pendente').sort((a,b)=>a.time.localeCompare(b.time));
            if(!p.length){hideNotification();return}
            const n=p[0],w=new Date(),[h,m]=n.time.split(':').map(Number),st=new Date(TODAY);st.setHours(h,m,0,0);
            const d=Math.floor((st.getTime()-w.getTime())/60000);
            if(d>=9&&d<=11&&lastNotifiedSurgeryId!==n.id){
                showNotification(`🔔 PRÓXIMA CIRURGIA EM 10 MINUTOS: ${n.type.replace(/\n/g,' ')} | Sala: ${n.room} | Paciente: ${n.patient}${n.age?`, ${n.age} anos`:''} | Horário: ${n.time}`);
                playNotificationSound();lastNotifiedSurgeryId=n.id
            }
            if(d<-5){lastNotifiedSurgeryId=null;hideNotification()}
        }

        function showNotification(m){document.getElementById('notificationText').textContent=m;document.getElementById('notificationBar').classList.add('show');if(notificationTimeout)clearTimeout(notificationTimeout);notificationTimeout=setTimeout(()=>document.getElementById('notificationBar').classList.remove('show'),15000)}
        function hideNotification(){document.getElementById('notificationBar').classList.remove('show')}

        function checkNewDay(){const c=new Date().getDate(),n=getToday();if(n!==TODAY){TODAY=n;lastNotifiedSurgeryId=null;hideNotification();updatePanel();lastDayCheck=c}}

        function updateClock(){
            const n=new Date();
            document.getElementById('liveTime').textContent=n.toLocaleTimeString('pt-BR');
            document.getElementById('liveDate').textContent=n.toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
            if(n.getDate()!==lastDayCheck){lastDayCheck=n.getDate();checkNewDay()}
        }

        function updatePanel(){
            const t=currentSurgeries.filter(s=>s.date===TODAY);
            document.getElementById('inProgress').textContent=String(t.filter(s=>s.status==='em_andamento').length).padStart(2,'0');
            document.getElementById('completed').textContent=String(t.filter(s=>s.status==='concluida').length).padStart(2,'0');
            document.getElementById('waiting').textContent=String(t.filter(s=>s.status==='pendente').length).padStart(2,'0');
            document.getElementById('cancelled').textContent=String(t.filter(s=>s.status==='cancelada').length).padStart(2,'0');
            const b=document.getElementById('surgeriesTableBody');
            if(!t.length){b.innerHTML='<tr><td colspan="10"><div class="empty-state">NENHUM PROCEDIMENTO AGENDADO PARA HOJE</div></td></tr>'}
            else{b.innerHTML=t.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{
                let sh='',rc='';
                if(s.status==='pendente')sh=`<span class="status-badge status-waiting">⏳ Aguardando</span>`;
                else if(s.status==='em_andamento'){sh=`<span class="status-badge status-progress">⚙️ Em Andamento</span>`;rc='row-ongoing'}
                else if(s.status==='concluida')sh=`<span class="status-badge status-done">✅ Finalizado</span>`;
                else{sh=`<span class="status-badge status-cancelled">❌ Cancelada</span>`;rc='row-cancelled'}
                const mh=s.cancelReason?`<br><span class="cancel-badge" title="${s.cancelReason}">Motivo: ${s.cancelReason.substring(0,15)}${s.cancelReason.length>15?'...':''}</span>`:'';
                const pr=(s.type||'-').replace(/\n/g,'<br>');
                return `<tr class="${rc}"><td><strong>${s.room}</strong></td><td>${s.time}</td><td><span class="cell-content">${s.patient||'-'}</span></td><td>${s.age||'-'}</td><td><span class="cell-content">${pr}${mh}</span></td><td><span class="cell-content">Dr. ${s.doctor||'-'}${s.specialty?`<br><span class="specialty-tag">${s.specialty}</span>`:''}</span></td><td>${s.specialty||'-'}</td><td><span class="cell-content">Dr. ${s.anesthetist||'-'}</span></td><td>${s.circulante||'-'}</td><td>${sh}</td></tr>`
            }).join('')}
            document.getElementById('updateTime').textContent=`Atualizado: ${new Date().toLocaleTimeString('pt-BR')}`
        }

        const sr=ref(db,'surgeries');onValue(sr,(sn)=>{currentSurgeries=sn.val()?Object.values(sn.val()):[];checkNewDay();updatePanel();checkNextSurgery()});
        onValue(ref(db,'settings/logo'),(sn)=>{if(sn.val())document.getElementById('logoContainer').innerHTML=`<img src="${sn.val()}" alt="Logo HRPI">`});
        onValue(ref(db,'settings/govLogo'),(sn)=>{if(sn.val())document.getElementById('govLogoContainer').innerHTML=`<img src="${sn.val()}" alt="Logo Governo">`});

        updateClock();updatePanel();
        setInterval(updateClock,1000);setInterval(checkNewDay,5000);
        setInterval(checkNextSurgery,15000);setInterval(updatePanel,20000);
        document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){checkNewDay();updatePanel();checkNextSurgery()}});
    </script>
</body>
</html>
